# Local Supabase config for bathhub CRUD integration tests.
# API is exposed on 54323 so SUPABASE_URL=http://127.0.0.1:54323 matches supabase status.
#
# Only services required by the integration suite are enabled. Optional Supabase
# services (studio, storage, realtime, etc.) add several extra image pulls and
# container health checks during `supabase start`, which is especially slow when
# Supabase runs through the nested Docker daemon inside the test container.

project_id = "bathhub-integration-tests"

[api]
enabled = true
port = 54323
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000
# CLI 2.106.0+ defaults auto_expose_new_tables to false; bathroom_data_primary
# grants live in supabase/migrations/20260614000000_bathroom_data_primary_data_api_grants.sql.

[db]
port = 54322
shadow_port = 54320
major_version = 15

[realtime]
enabled = false

[studio]
enabled = false
port = 54329

[inbucket]
enabled = false
port = 54324

[storage]
enabled = false

[auth]
enabled = true

[edge_runtime]
enabled = false

[analytics]
enabled = false
